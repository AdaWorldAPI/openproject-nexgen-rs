# Railway deployment configuration for OpenProject RS
# https://docs.railway.app/reference/config-as-code

[build]
# Use Dockerfile for building
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Number of replicas
numReplicas = 1

# Health check configuration. MUST be the DB-aware readiness route: plain
# `/health` is a hardcoded "OK" that stays green with no database at all
# (5+3 council, S3 — a mis-wired DATABASE_URL would otherwise deploy
# "healthy" while every /api/v3 call 500s).
healthcheckPath = "/health/ready"
healthcheckTimeout = 30

# Restart policy
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Resource limits (adjust based on plan)
# memory = "512Mi"
# cpu = "0.5"

[env]
# Default environment variables — override in the Railway dashboard.
HOST = "0.0.0.0"
PORT = { default = "8080", isPublic = true }
RUST_LOG = "info,op_server=debug"

# Database — add a Railway **Postgres** plugin to the project; Railway then
# injects `DATABASE_URL` into this service automatically. `op-core::config`
# reads `DATABASE_URL` (and falls back to Railway's individual PG* vars), so
# no extra wiring is needed. On boot the server applies the embedded schema
# migrations (crates/op-db/migrations) — a fresh Postgres becomes queryable
# without any manual `psql` step.
#
# If you reference the plugin explicitly rather than relying on auto-inject:
#   DATABASE_URL = "${{ Postgres.DATABASE_URL }}"

# Reality-check / demo posture — BOTH gates are OFF by default and are set
# PER-INSTANCE in the Railway dashboard, never committed here (5+3 council,
# S3/R2: a committed-on default would seed mock data into, and open anonymous
# writes on, ANY database this repo is ever deployed against).
#
#   HYDRATE = "1"            → load the mock kanban board on boot
#                              (crates/op-db/seeds/kanban_seed.sql — 3 projects,
#                              5 statuses, ~40 work packages; idempotent).
#   OP_ALLOW_ANONYMOUS = "1" → serve /api/v3 without authentication
#                              (reads AND writes — demo boxes only).
#
# A fresh deploy without these is a migrated, EMPTY, auth-required instance.
