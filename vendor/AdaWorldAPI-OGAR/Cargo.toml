# vendor/AdaWorldAPI-OGAR/Cargo.toml
#
# Standalone workspace root for the vendored OGAR crate slice — the same
# pattern as vendor/AdaWorldAPI-ruff (see that file's header for why the
# vendor needs its own nearest-ancestor workspace root).
#
# SNAPSHOT STATE (2026-07-02): ogar-vocab, ogar-render-askama (incl. its
# 24 askama templates), ogar-class-view reassembled from upstream `main`
# HEAD via raw.githubusercontent.com (git relay 403s the repo in this
# session). Upstream's workspace pins edition 2024 / rust-version 1.95.
#
# RECORDED DEVIATION from upstream (one line): ogar-class-view's
# `lance-graph-contract` dep is a git dep upstream; here it is redirected
# to the sibling vendor mirror (path) so the slice resolves offline.
[workspace]
resolver = "2"
members = [
    "crates/ogar-vocab",
    "crates/ogar-render-askama",
    "crates/ogar-class-view",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.95"
authors = ["AdaWorldAPI"]
license = "GPL-3.0"
repository = "https://github.com/AdaWorldAPI/OGAR"

[workspace.dependencies]
serde = { version = "1.0", features = ["derive"] }

[workspace.lints.rust]
[workspace.lints.clippy]
