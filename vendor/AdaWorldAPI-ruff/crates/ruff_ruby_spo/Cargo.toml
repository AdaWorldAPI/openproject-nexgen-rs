[package]
name = "ruff_ruby_spo"
version = "0.2.0"
publish = false
edition = "2024"
rust-version = "1.86"
description = "Ruby/Rails (OpenProject) frontend for ruff_spo_triplet. Walks an app/models tree and fills a language-agnostic ModelGraph, which expands to the same SPO triples as the Python/Odoo frontend. Sprint C17a: parser-driven class shape via lib-ruby-parser (pure-Rust typed AST); captures superclass + association options (class_name, through, source, as, polymorphic, dependent, optional, inverse_of, foreign_key) that the C4 line scanner could not see."
license = "MIT"

[lib]
name = "ruff_ruby_spo"

[dependencies]
ruff_spo_triplet = { workspace = true }
# Sprint C17a parser graduation. Pure-Rust typed AST, no Ruby runtime.
# Replaces the C4 dependency-free line scanner inside `parse.rs` for class
# shape + association options. `scan.rs` / `fields.rs` / `functions.rs`
# remain line-scanner-based for `body_source` traversal (graduation roadmap
# in `RUBY-FRONTEND.md`).
lib-ruby-parser  = { workspace = true }

[lints]
workspace = true
