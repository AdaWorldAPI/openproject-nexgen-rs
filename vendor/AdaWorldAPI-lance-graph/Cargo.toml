# vendor/AdaWorldAPI-lance-graph/Cargo.toml
#
# Standalone workspace root for the vendored lance-graph-contract partial mirror.
# Same pattern as vendor/AdaWorldAPI-ruff/Cargo.toml (see codex PR #6 P1 for
# the rationale): without this file cargo walks up to nexgen's root workspace,
# which does not list the vendored crate as a member and fails to parse.
#
# With this file, cargo treats `vendor/AdaWorldAPI-lance-graph/` as a
# separate, nearest-ancestor workspace for the vendored crate (the standard
# `cargo check --manifest-path …/lance-graph-contract/Cargo.toml` invocation
# stops here, not at the nexgen root).
#
# This is a build/parsing aid only. nexgen's `op-codegen-bucket` crate
# depends on this vendored contract via `path = "../../vendor/…"`; that path
# dep also resolves correctly through whichever workspace cargo is in,
# because it is a direct path dep (no `workspace = true`).

[workspace]
resolver = "2"
members = ["crates/lance-graph-contract"]

# Empty workspace-level keys; vendored crate carries its own [package] and
# [dependencies]. No transitive deps need to be declared here.
